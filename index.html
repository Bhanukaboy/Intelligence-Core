<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core | Llama 3.1</title>
    <!-- Tab Icon (Generic 'C' for Core) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%232563eb%22/><text y=%22.9em%22 x=%2212px%22 font-size=%2275%22 fill=%22white%22 font-family=%22monospace%22 font-weight=%22bold%22>C</text></svg>">
    
    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Neutral Header -->
        <header class="chat-header">
            <div class="header-left">
                <div class="app-logo">C</div>
                <div class="app-info">
                    <h1 class="app-name">Intelligence Core</h1>
                    <p class="version-tag">Llama 3.1 Architecture</p>
                </div>
            </div>
            <div class="header-right">
                <button class="icon-btn" onclick="window.location.reload()" title="Reset Session">
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
        </header>

        <!-- Chat Container -->
        <main id="chat-container" class="chat-body">
            <div class="hero-start">
                <div class="app-logo large">C</div>
                <h2>System Online</h2>
                <p>Ready to process with Llama 3.1</p>
            </div>
        </main>

        <!-- Footer with Attachment & Copyright -->
        <footer class="chat-footer">
            <div id="preview-area" class="preview-strip"></div>
            
            <div class="input-box">
                <label for="file-input" class="attach-trigger" title="Attach Image">
                    <i class="bi bi-paperclip"></i>
                </label>
                <input type="file" id="file-input" hidden multiple accept="image/*">
                
                <textarea id="user-input" rows="1" placeholder="Type a command or question..." autocomplete="off"></textarea>
                
                <button id="send-btn" onclick="sendMessage()" class="submit-btn">
                    <i class="bi bi-arrow-up-short"></i>
                </button>
            </div>
            
            <div class="copyright-bar">
                <span>© bhanukaboy</span>
            </div>
        </footer>
    </div>

    <!-- JS Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
